<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王晓林</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --page-edge-gap: 20px;
            --app-height: 100vh;
            --liquid-glass-icon: rgba(56, 64, 79, 0.82);
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at left center, rgba(233, 212, 208, 0.32), transparent 28%),
                linear-gradient(180deg, #fffdfb 0%, #ffffff 100%);
            min-height: var(--app-height);
            overflow: hidden;
            position: relative;
        }

        .scene {
            position: fixed;
            inset: 0;
            transition: opacity 0.34s ease, visibility 0.34s ease;
        }

        .scene:not(.is-active) {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .home-scene {
            z-index: 2;
        }

        .home-layout {
            min-height: var(--app-height);
            display: grid;
            grid-template-columns: 48vw 52vw;
            align-items: stretch;
        }

        .rose-panel {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 48vw;
            top: var(--page-edge-gap);
            height: calc(var(--app-height) - var(--page-edge-gap));
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            overflow: hidden;
            cursor: pointer;
            z-index: 3;
        }

        .rose {
            width: auto;
            max-width: none;
            height: calc(var(--app-height) - (var(--page-edge-gap) * 2));
            display: block;
            transform: translateX(-24%) translateY(0);
            filter: drop-shadow(0 18px 38px rgba(128, 72, 74, 0.1));
            user-select: none;
            pointer-events: none;
            animation: floatRose 6.5s ease-in-out infinite;
        }

        .rose-panel.is-activating .rose {
            animation-play-state: paused;
            filter: drop-shadow(0 24px 42px rgba(128, 72, 74, 0.14));
        }

        .content {
            grid-column: 2;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            min-height: var(--app-height);
            width: 100%;
            padding: 17vh 8vw 0 2vw;
            text-align: left;
            z-index: 2;
        }

        .quote {
            font-size: 34px;
            line-height: 1.82;
            color: #111111;
            white-space: pre-line;
            letter-spacing: 0.01em;
            font-weight: 300;
            max-width: 12em;
            animation: fadeIn 1s ease-out;
            margin: 0;
            text-align: left;
        }

        .footer-container {
            position: fixed;
            bottom: var(--page-edge-gap);
            right: var(--page-edge-gap);
            z-index: 20;
            animation: fadeIn 1s ease-out;
            cursor: pointer;
        }

        .footer-image {
            width: 80px;
            height: auto;
            opacity: 0.9;
            display: block;
            transition: transform 0.3s;
        }

        .footer-container:hover .footer-image {
            transform: scale(1.1);
        }

        .social-footer {
            position: fixed;
            bottom: var(--page-edge-gap);
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 15;
            padding: 12px 18px;
            border-radius: 999px;
            isolation: isolate;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.66) 0%, rgba(255, 255, 255, 0.18) 100%),
                linear-gradient(145deg, rgba(255, 255, 255, 0.38) 0%, rgba(255, 255, 255, 0.08) 48%, rgba(188, 214, 255, 0.18) 100%),
                rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(30px) saturate(230%) brightness(1.04);
            -webkit-backdrop-filter: blur(30px) saturate(230%) brightness(1.04);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                inset 0 -10px 18px rgba(255, 255, 255, 0.18),
                inset 0 0 0 1px rgba(255, 255, 255, 0.14),
                0 14px 36px rgba(126, 141, 168, 0.2),
                0 3px 10px rgba(255, 255, 255, 0.32);
            opacity: 0;
            visibility: hidden;
            transition:
                transform 0.28s ease-out,
                opacity 0.28s ease-out,
                visibility 0.28s ease-out,
                box-shadow 0.28s ease-out;
        }

        .social-footer::before,
        .social-footer::after,
        .glass-circle-btn::before,
        .glass-circle-btn::after,
        .emoji-item::before,
        .emoji-item::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
        }

        .social-footer::before {
            inset: 1.5px;
            background:
                radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.92), transparent 24%),
                radial-gradient(circle at 82% 24%, rgba(196, 218, 255, 0.22), transparent 28%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.02) 58%, rgba(170, 201, 255, 0.1) 100%);
            opacity: 0.95;
            z-index: -1;
        }

        .social-footer::after {
            inset: 8px 18px auto;
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0));
            opacity: 0.9;
        }

        .social-footer.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .social-icon {
            width: 22px;
            height: 22px;
            cursor: pointer;
            opacity: 0.82;
            padding: 3px;
            border-radius: 999px;
            filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.32));
            transition:
                transform 0.24s ease,
                opacity 0.24s ease,
                background 0.24s ease,
                box-shadow 0.24s ease;
        }

        .social-icon:hover {
            opacity: 1;
            transform: translateY(-1px) scale(1.08);
            background: rgba(255, 255, 255, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                0 6px 14px rgba(126, 141, 168, 0.16);
        }

        .emoji-scene {
            z-index: 4;
            background: linear-gradient(180deg, #f9fafc 0%, #ffffff 24%, #fcfcfd 100%);
        }

        .emoji-scene::before {
            content: "";
            position: fixed;
            top: -88px;
            left: max(-36px, calc(50% - 520px));
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.98), transparent 24%),
                radial-gradient(circle at 66% 28%, rgba(147, 210, 255, 0.62), transparent 34%),
                radial-gradient(circle at 28% 72%, rgba(255, 188, 210, 0.52), transparent 36%),
                radial-gradient(circle at 76% 74%, rgba(255, 231, 162, 0.46), transparent 30%);
            filter: blur(34px) saturate(160%);
            opacity: 0.95;
            pointer-events: none;
            z-index: 0;
        }

        .emoji-scene-inner {
            position: relative;
            z-index: 1;
            min-height: var(--app-height);
            height: 100%;
            overflow-y: auto;
            padding: 24px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            padding-top: 8px;
            position: relative;
            z-index: 1;
        }

        .emoji-item {
            font-size: 48px;
            text-align: center;
            padding: 10px;
            border-radius: 24px;
            cursor: pointer;
            transition:
                transform 0.22s ease,
                filter 0.24s ease,
                box-shadow 0.24s ease,
                background 0.24s ease,
                border-color 0.24s ease;
            user-select: none;
            min-height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            isolation: isolate;
            overflow: hidden;
            background: transparent;
            border: 1px solid transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: none;
        }

        .emoji-item::before {
            inset: 1.5px;
            background:
                radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.88), transparent 26%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.02) 56%, rgba(170, 201, 255, 0.1) 100%);
            opacity: 0;
            z-index: -1;
        }

        .emoji-item::after {
            inset: 9px 14px auto;
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0));
            opacity: 0;
        }

        .emoji-item.incomplete {
            filter: grayscale(100%) opacity(0.3);
            cursor: not-allowed;
            pointer-events: none;
        }

        .emoji-item.completed:hover {
            transform: translateY(-2px) scale(1.04);
            border-color: rgba(255, 255, 255, 0.48);
            backdrop-filter: blur(24px) saturate(220%) brightness(1.03);
            -webkit-backdrop-filter: blur(24px) saturate(220%) brightness(1.03);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.98),
                inset 0 -12px 20px rgba(255, 255, 255, 0.18),
                inset 0 0 0 1px rgba(255, 255, 255, 0.14),
                0 18px 28px rgba(126, 141, 168, 0.18),
                0 4px 12px rgba(255, 255, 255, 0.3);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.18) 100%),
                linear-gradient(145deg, rgba(255, 255, 255, 0.38) 0%, rgba(255, 255, 255, 0.1) 48%, rgba(188, 214, 255, 0.2) 100%),
                rgba(255, 255, 255, 0.12);
        }

        .emoji-item.completed:hover::before {
            opacity: 0.92;
        }

        .emoji-item.completed:hover::after {
            opacity: 0.78;
        }

        .emoji-thumb {
            width: 60px;
            height: 60px;
            object-fit: contain;
            display: block;
            position: relative;
            z-index: 1;
        }

        .emoji-item.completed:hover .emoji-thumb {
            filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.32));
        }

        .rose-emoji-item {
            scroll-margin-top: 24px;
        }

        .rose-flight-image {
            position: fixed;
            object-fit: contain;
            pointer-events: none;
            z-index: 1200;
            filter: drop-shadow(0 22px 38px rgba(128, 72, 74, 0.16));
            transform-origin: center center;
        }

        .glass-circle-btn {
            width: var(--glass-btn-size, 36px);
            height: var(--glass-btn-size, 36px);
            border-radius: 50%;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            isolation: isolate;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.64) 0%, rgba(255, 255, 255, 0.14) 100%),
                linear-gradient(145deg, rgba(255, 255, 255, 0.34) 0%, rgba(255, 255, 255, 0.06) 48%, rgba(188, 214, 255, 0.18) 100%),
                rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.48);
            backdrop-filter: blur(28px) saturate(240%) brightness(1.04);
            -webkit-backdrop-filter: blur(28px) saturate(240%) brightness(1.04);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.94),
                inset 0 -8px 14px rgba(255, 255, 255, 0.18),
                inset 0 0 0 1px rgba(255, 255, 255, 0.14),
                0 12px 24px rgba(126, 141, 168, 0.18),
                0 2px 8px rgba(255, 255, 255, 0.28);
            transition:
                transform 0.22s ease,
                box-shadow 0.22s ease;
        }

        .glass-circle-btn::before {
            inset: 1.5px;
            background:
                radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.92), transparent 34%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.02) 55%, rgba(170, 201, 255, 0.12) 100%);
            opacity: 0.95;
            z-index: -1;
        }

        .glass-circle-btn::after {
            inset: 6px 8px auto;
            height: 11px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0));
            opacity: 0.9;
        }

        .glass-circle-btn:hover {
            transform: translateY(-1px) scale(1.018);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.98),
                inset 0 -10px 18px rgba(255, 255, 255, 0.22),
                inset 0 0 0 1px rgba(255, 255, 255, 0.18),
                0 14px 26px rgba(126, 141, 168, 0.2),
                0 4px 10px rgba(255, 255, 255, 0.34);
        }

        .glass-circle-btn:active {
            transform: translateY(1px) scale(0.96);
        }

        .close-btn {
            --glass-btn-size: 36px;
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .glass-close-icon {
            width: 11px;
            height: 11px;
            position: relative;
            opacity: 0.9;
            filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.3));
        }

        .glass-close-icon::before,
        .glass-close-icon::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 1.8px;
            border-radius: 999px;
            background: rgba(56, 64, 79, 0.82);
            transform-origin: center;
            translate: -50% -50%;
        }

        .glass-close-icon::before {
            rotate: 45deg;
        }

        .glass-close-icon::after {
            rotate: -45deg;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .music-card {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .modal-overlay.active .music-card {
            transform: scale(1);
        }

        .music-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .music-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .image-card {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            flex-direction: column;
        }

        .image-card img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            object-fit: contain;
            display: block;
        }

        .image-card .close-btn {
            top: -34px;
            right: -2px;
            z-index: 1001;
        }

        .image-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 10px;
            max-width: 100%;
            padding-bottom: 10px;
        }

        .image-carousel img,
        .image-carousel video {
            scroll-snap-align: center;
            flex: 0 0 auto;
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
            object-fit: contain;
            display: block;
        }

        .image-carousel::-webkit-scrollbar {
            height: 6px;
        }

        .image-carousel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        .image-carousel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatRose {
            0%, 100% {
                transform: translateX(-24%) translateY(0);
            }
            50% {
                transform: translateX(-22%) translateY(-8px);
            }
        }

        @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
            .social-footer,
            .glass-circle-btn,
            .emoji-item.completed:hover {
                background: rgba(255, 255, 255, 0.9);
            }
        }

        @media (min-width: 768px) {
            .image-card .close-btn {
                right: -30px;
                top: -30px;
            }
        }

        @media (max-width: 900px) {
            .home-layout {
                grid-template-columns: 1fr;
                min-height: var(--app-height);
            }

            .rose-panel {
                top: 0;
                width: 58vw;
                height: var(--app-height);
                justify-content: flex-start;
            }

            .rose {
                width: auto;
                height: min(54vh, 520px);
                transform: translateX(-18%) translateY(10%);
            }

            .content {
                grid-column: 1;
                min-height: var(--app-height);
                width: 100%;
                padding: 10vh 24px 44vh;
                align-items: center;
                text-align: center;
            }

            .quote {
                font-size: 28px;
                max-width: none;
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 640px) {
            .rose-panel {
                width: 62vw;
            }

            .rose {
                width: auto;
                height: min(50vh, 460px);
                transform: translateX(-14%) translateY(10%);
            }

            .content {
                padding: 9vh 20px 40vh;
            }

            .quote {
                font-size: 24px;
                line-height: 1.78;
                max-width: none;
                text-align: center;
            }

            .social-footer {
                gap: 10px;
                padding: 11px 16px;
            }

            .social-icon {
                width: 20px;
                height: 20px;
            }

            .emoji-scene-inner {
                padding: 18px 16px 32px;
            }

            .grid-container {
                gap: 18px;
            }

            .emoji-item {
                min-height: 82px;
                border-radius: 22px;
            }

            .emoji-thumb {
                width: 56px;
                height: 56px;
            }
        }
    </style>
</head>
<body>
    <main class="scene home-scene is-active" id="homeScene">
        <div class="home-layout">
            <section class="rose-panel" id="rosePanel" aria-label="打开玫瑰 Emoji 场景" role="link" tabindex="0">
                <img src="resource/apple-rose-emoji.png" alt="玫瑰" class="rose" id="homeRoseImage">
            </section>

            <section class="content">
                <div class="quote">
                    你未看此花时，
                    此花与汝心同归于寂；
                    你来看此花时，
                    则此花颜色一时明白起来，
                    便知此花不在你心外。
                </div>
            </section>
        </div>

        <div class="footer-container">
            <img src="resource/小王子.png" alt="小王子" class="footer-image">
        </div>

        <div class="social-footer">
            <img src="resource/抖音.svg" alt="抖音" class="social-icon" onclick="showImageModal('resource/抖音.JPG')">
            <img src="resource/网易云音乐.svg" alt="网易云音乐" class="social-icon" onclick="showImageModal('resource/网易云音乐.JPG')">
            <img src="resource/豆瓣.svg" alt="豆瓣" class="social-icon" onclick="window.open('https://www.douban.com/people/259913725/?_i=5892722hgBroxa', '_blank')">
            <img src="resource/哔哩哔哩.svg" alt="哔哩哔哩" class="social-icon" onclick="showImageModal('resource/bilibili.PNG')">
            <img src="resource/微信.svg" alt="微信" class="social-icon" onclick="showImageModal('resource/微信.JPG')">
            <img src="resource/Pinterest.svg" alt="Pinterest" class="social-icon" onclick="window.open('https://pin.it/52Z37WIwO', '_blank')">
            <img src="resource/github.svg" alt="GitHub" class="social-icon" onclick="window.open('https://github.com/lessismoretest?tab=repositories', '_blank')">
        </div>
    </main>

    <section class="scene emoji-scene" id="emojiScene" aria-hidden="true">
        <div class="emoji-scene-inner" id="emojiSceneInner">
            <div class="grid-container" id="emojiGrid">
                <!-- Emoji 会通过 JS 插入这里 -->
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="imageModal">
        <div class="image-card" onclick="event.stopPropagation();">
            <div class="close-btn glass-circle-btn" onclick="closeImageModal()" aria-label="关闭">
                <span class="glass-close-icon" aria-hidden="true"></span>
            </div>
            <div id="imageContainer" style="width: 100%; display: flex; justify-content: center;">
                <img id="modalImage" src="" alt="Photo">
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="textModal">
        <div class="music-card" id="textModalCard" onclick="event.stopPropagation()">
            <div class="close-btn glass-circle-btn" onclick="closeTextModal()" aria-label="关闭">
                <span class="glass-close-icon" aria-hidden="true"></span>
            </div>
            <div class="music-title" id="textModalTitle"></div>
            <div class="music-desc" id="textModalContent" style="white-space: pre-wrap; margin-top: 15px; font-size: 16px; line-height: 1.6;"></div>
            <div id="textModalImages" style="margin-top: 15px; width: 100%; display: none;"></div>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        const body = document.body;
        const homeScene = document.getElementById('homeScene');
        const emojiScene = document.getElementById('emojiScene');
        const emojiSceneInner = document.getElementById('emojiSceneInner');
        const emojiGrid = document.getElementById('emojiGrid');
        const rosePanel = document.getElementById('rosePanel');
        const homeRoseImage = document.getElementById('homeRoseImage');
        const footerContainer = document.querySelector('.footer-container');
        const socialFooter = document.querySelector('.social-footer');

        const imageModal = document.getElementById('imageModal');
        const textModal = document.getElementById('textModal');
        const textModalCard = document.getElementById('textModalCard');
        const modalImage = document.getElementById('modalImage');
        const textModalTitle = document.getElementById('textModalTitle');
        const textModalContent = document.getElementById('textModalContent');
        const textModalImages = document.getElementById('textModalImages');
        const imageContainer = document.getElementById('imageContainer');

        const assetVersion = Date.now().toString();
        let allEmojisData = [];
        let roseFlightSourceRect = null;
        let pendingRoseEntrance = false;

        function bustAssetCache(path) {
            if (!path || /^(https?:)?\/\//.test(path)) {
                return path;
            }
            return `${path}${path.includes('?') ? '&' : '?'}v=${assetVersion}`;
        }

        function refreshStaticAssets() {
            document.querySelectorAll('img[src^="resource/"]').forEach((img) => {
                const originalSrc = img.dataset.assetSrc || img.getAttribute('src');
                img.dataset.assetSrc = originalSrc;
                img.src = bustAssetCache(originalSrc);
            });
        }

        function setAppHeight() {
            const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            root.style.setProperty('--app-height', `${viewportHeight}px`);
        }

        function getSceneFromLocation() {
            return window.location.hash === '#emoji' ? 'emoji' : 'home';
        }

        function updateHistoryForScene(scene, replace = false) {
            const url = scene === 'emoji' ? `${window.location.pathname}#emoji` : window.location.pathname;
            const method = replace ? 'replaceState' : 'pushState';
            window.history[method]({}, '', url);
        }

        function syncScene(scene) {
            const emojiActive = scene === 'emoji';
            homeScene.classList.toggle('is-active', !emojiActive);
            emojiScene.classList.toggle('is-active', emojiActive);
            emojiScene.setAttribute('aria-hidden', emojiActive ? 'false' : 'true');

            if (!emojiActive) {
                rosePanel.classList.remove('is-activating');
                pendingRoseEntrance = false;
                roseFlightSourceRect = null;
            } else {
                rosePanel.classList.toggle('is-activating', pendingRoseEntrance);
                if (allEmojisData.length > 0) {
                    maybeAnimateRoseEntrance();
                }
            }
        }

        function goToScene(scene, options = {}) {
            const { fromRose = false, replace = false } = options;

            if (scene === 'emoji' && fromRose) {
                roseFlightSourceRect = homeRoseImage.getBoundingClientRect();
                pendingRoseEntrance = true;
            } else if (scene !== 'emoji') {
                pendingRoseEntrance = false;
                roseFlightSourceRect = null;
            }

            updateHistoryForScene(scene, replace);
            syncScene(scene);
        }

        function animateRoseFlight(sourceRect, targetRect, options = {}) {
            const { hideSource = null, hideTarget = null, onFinish = null } = options;
            const overlay = document.createElement('img');
            overlay.src = bustAssetCache('resource/apple-rose-emoji.png');
            overlay.alt = '';
            overlay.className = 'rose-flight-image';
            overlay.style.left = `${sourceRect.left}px`;
            overlay.style.top = `${sourceRect.top}px`;
            overlay.style.width = `${sourceRect.width}px`;
            overlay.style.height = `${sourceRect.height}px`;

            if (hideSource) {
                hideSource.style.opacity = '0';
            }

            if (hideTarget) {
                hideTarget.style.opacity = '0';
            }

            document.body.appendChild(overlay);

            return overlay.animate([
                {
                    left: `${sourceRect.left}px`,
                    top: `${sourceRect.top}px`,
                    width: `${sourceRect.width}px`,
                    height: `${sourceRect.height}px`,
                    opacity: 1,
                    filter: 'drop-shadow(0 22px 38px rgba(128, 72, 74, 0.16))'
                },
                {
                    left: `${targetRect.left}px`,
                    top: `${targetRect.top}px`,
                    width: `${targetRect.width}px`,
                    height: `${targetRect.height}px`,
                    opacity: 1,
                    filter: 'drop-shadow(0 8px 14px rgba(128, 72, 74, 0.12))'
                }
            ], {
                duration: 720,
                easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
                fill: 'forwards'
            }).finished.finally(() => {
                if (hideSource) {
                    hideSource.style.opacity = '';
                }

                if (hideTarget) {
                    hideTarget.style.opacity = '';
                }

                overlay.remove();

                if (typeof onFinish === 'function') {
                    onFinish();
                }
            });
        }

        function showImageModal(srcOrArray) {
            imageContainer.innerHTML = '';

            if (Array.isArray(srcOrArray)) {
                if (srcOrArray.length === 1) {
                    const img = document.createElement('img');
                    img.src = bustAssetCache(srcOrArray[0]);
                    img.alt = 'Photo';
                    img.id = 'modalImage';
                    imageContainer.appendChild(img);
                } else {
                    const carousel = document.createElement('div');
                    carousel.className = 'image-carousel';

                    srcOrArray.forEach(src => {
                        const img = document.createElement('img');
                        img.src = bustAssetCache(src);
                        img.alt = 'Photo';
                        img.className = 'carousel-item';
                        carousel.appendChild(img);
                    });

                    imageContainer.appendChild(carousel);
                }
            } else {
                const img = document.createElement('img');
                img.src = bustAssetCache(srcOrArray);
                img.alt = 'Photo';
                img.id = 'modalImage';
                imageContainer.appendChild(img);
            }

            imageModal.style.display = 'flex';
            imageModal.offsetHeight;
            imageModal.classList.add('active');
        }

        function closeImageModal() {
            imageModal.classList.remove('active');
            window.setTimeout(() => {
                imageModal.style.display = 'none';
                imageContainer.innerHTML = '';
            }, 300);
        }

        function showTextModal(title, text, images, videos) {
            textModalTitle.textContent = title;
            textModalContent.textContent = text;
            textModalImages.innerHTML = '';

            const imageArray = images ? (Array.isArray(images) ? images : [images]) : [];
            const videoArray = videos ? (Array.isArray(videos) ? videos : [videos]) : [];
            const hasImages = imageArray.length > 0;
            const hasVideos = videoArray.length > 0;
            const mediaCount = imageArray.length + videoArray.length;

            if (hasImages || hasVideos) {
                textModalCard.style.maxWidth = '500px';

                if (mediaCount === 1) {
                    if (hasVideos) {
                        const video = document.createElement('video');
                        video.src = bustAssetCache(videoArray[0]);
                        video.controls = true;
                        video.style.maxHeight = '300px';
                        video.style.maxWidth = '100%';
                        video.style.borderRadius = '8px';
                        video.style.boxShadow = '0 5px 25px rgba(0, 0, 0, 0.5)';
                        video.style.display = 'block';
                        textModalImages.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = bustAssetCache(imageArray[0]);
                        img.alt = 'Photo';
                        img.style.maxHeight = '300px';
                        img.style.maxWidth = '100%';
                        img.style.borderRadius = '8px';
                        img.style.boxShadow = '0 5px 25px rgba(0, 0, 0, 0.5)';
                        img.style.display = 'block';
                        img.style.margin = '0 auto';
                        img.onclick = (event) => {
                            event.stopPropagation();
                            showImageModal(imageArray[0]);
                            imageModal.style.zIndex = '1002';
                        };
                        textModalImages.appendChild(img);
                    }
                } else {
                    const carousel = document.createElement('div');
                    carousel.className = 'image-carousel';
                    carousel.style.paddingBottom = '5px';

                    videoArray.forEach(src => {
                        const video = document.createElement('video');
                        video.src = bustAssetCache(src);
                        video.controls = true;
                        video.className = 'carousel-item';
                        video.style.maxHeight = '300px';
                        video.style.maxWidth = '100%';
                        carousel.appendChild(video);
                    });

                    imageArray.forEach(src => {
                        const img = document.createElement('img');
                        img.src = bustAssetCache(src);
                        img.alt = 'Photo';
                        img.className = 'carousel-item';
                        img.style.maxHeight = '300px';
                        img.onclick = (event) => {
                            event.stopPropagation();
                            showImageModal(src);
                            imageModal.style.zIndex = '1002';
                        };
                        carousel.appendChild(img);
                    });

                    textModalImages.appendChild(carousel);
                }

                textModalImages.style.display = 'block';
            } else {
                textModalCard.style.maxWidth = '320px';
                textModalImages.style.display = 'none';
            }

            textModal.style.display = 'flex';
            textModal.offsetHeight;
            textModal.classList.add('active');
            textModal.style.zIndex = '1001';
        }

        function closeTextModal() {
            textModal.classList.remove('active');
            window.setTimeout(() => {
                textModal.style.display = 'none';
                textModal.style.zIndex = '';
            }, 300);
        }

        function sortEmojis(emojis) {
            return [...emojis].sort((a, b) => {
                const aIsRose = a.name === '玫瑰';
                const bIsRose = b.name === '玫瑰';

                if (aIsRose !== bIsRose) {
                    return aIsRose ? -1 : 1;
                }

                if (a.completed === b.completed) {
                    return 0;
                }

                return a.completed ? -1 : 1;
            });
        }

        function maybeAnimateRoseEntrance() {
            const roseItem = document.getElementById('emoji-rose');
            if (!roseItem) {
                pendingRoseEntrance = false;
                roseFlightSourceRect = null;
                rosePanel.classList.remove('is-activating');
                return;
            }

            roseItem.scrollIntoView({
                block: 'start',
                inline: 'center',
                behavior: 'auto'
            });

            if (!pendingRoseEntrance || !roseFlightSourceRect) {
                return;
            }

            const roseThumb = roseItem.querySelector('.emoji-thumb');
            if (!roseThumb) {
                pendingRoseEntrance = false;
                roseFlightSourceRect = null;
                rosePanel.classList.remove('is-activating');
                return;
            }

            window.requestAnimationFrame(() => {
                const targetRect = roseThumb.getBoundingClientRect();
                animateRoseFlight(roseFlightSourceRect, targetRect, {
                    hideTarget: roseThumb,
                    onFinish: () => {
                        pendingRoseEntrance = false;
                        roseFlightSourceRect = null;
                        rosePanel.classList.remove('is-activating');
                    }
                });
            });
        }

        function returnRoseToHomeScene() {
            const roseItem = document.getElementById('emoji-rose');
            const roseThumb = roseItem ? roseItem.querySelector('.emoji-thumb') : null;

            if (!roseThumb) {
                goToScene('home');
                return;
            }

            const sourceRect = roseThumb.getBoundingClientRect();
            updateHistoryForScene('home');
            syncScene('home');
            rosePanel.classList.add('is-activating');

            window.requestAnimationFrame(() => {
                const targetRect = homeRoseImage.getBoundingClientRect();
                animateRoseFlight(sourceRect, targetRect, {
                    hideSource: roseThumb,
                    hideTarget: homeRoseImage,
                    onFinish: () => {
                        rosePanel.classList.remove('is-activating');
                    }
                });
            });
        }

        function renderEmojis(emojis) {
            emojiGrid.innerHTML = '';

            if (emojis.length === 0) {
                emojiGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; padding: 20px;">没有找到相关 Emoji</p>';
                return;
            }

            emojis.forEach(item => {
                const div = document.createElement('div');
                div.className = `emoji-item ${item.completed ? 'completed' : 'incomplete'}`;
                div.title = item.name + (item.completed ? ' (已完成)' : ' (未完成)');

                const isRose = item.name === '玫瑰';
                if (isRose) {
                    div.id = 'emoji-rose';
                    div.classList.add('rose-emoji-item');
                }

                if (item.thumbnail) {
                    const img = document.createElement('img');
                    img.src = bustAssetCache(item.thumbnail);
                    img.alt = item.name;
                    img.className = 'emoji-thumb';
                    div.appendChild(img);
                } else {
                    div.textContent = item.char;
                }

                if (item.completed) {
                    div.onclick = () => {
                        if (isRose) {
                            returnRoseToHomeScene();
                            return;
                        }

                        if (item.text) {
                            showTextModal(item.char + ' ' + item.name, item.text, item.images, item.videos);
                        } else if (item.images && item.images.length > 0) {
                            showImageModal(item.images);
                        }
                    };
                }

                emojiGrid.appendChild(div);
            });

            if (getSceneFromLocation() === 'emoji') {
                maybeAnimateRoseEntrance();
            }
        }

        function openRoseEmojiScene() {
            goToScene('emoji', { fromRose: true });
        }

        function bindEvents() {
            footerContainer.addEventListener('mouseenter', () => {
                socialFooter.classList.add('show');
            });

            footerContainer.addEventListener('mouseleave', () => {
                window.setTimeout(() => {
                    if (!socialFooter.matches(':hover')) {
                        socialFooter.classList.remove('show');
                    }
                }, 100);
            });

            socialFooter.addEventListener('mouseleave', () => {
                socialFooter.classList.remove('show');
            });

            socialFooter.addEventListener('mouseenter', () => {
                socialFooter.classList.add('show');
            });

            rosePanel.addEventListener('click', openRoseEmojiScene);
            rosePanel.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    openRoseEmojiScene();
                }
            });

            imageModal.onclick = (event) => {
                if (event.target === imageModal) {
                    closeImageModal();
                }
            };

            textModal.onclick = (event) => {
                if (event.target === textModal) {
                    closeTextModal();
                }
            };

            window.addEventListener('resize', setAppHeight);
            window.addEventListener('orientationchange', setAppHeight);
            window.addEventListener('pageshow', setAppHeight);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', setAppHeight);
            }

            window.addEventListener('popstate', () => {
                pendingRoseEntrance = false;
                roseFlightSourceRect = null;
                syncScene(getSceneFromLocation());
            });
        }

        function loadEmojis() {
            fetch(bustAssetCache('emojis.json'))
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(emojis => {
                    allEmojisData = sortEmojis(emojis);
                    renderEmojis(allEmojisData);
                })
                .catch(error => {
                    console.error('Error loading emojis:', error);
                    emojiGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; padding: 20px;">加载数据失败，请检查 emojis.json 是否存在。</p>';
                });
        }

        setAppHeight();
        refreshStaticAssets();
        bindEvents();
        syncScene(getSceneFromLocation());
        loadEmojis();
    </script>
</body>
</html>
