<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王晓林</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'SimSun', serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quote {
            font-size: 32px;
            line-height: 1.8;
            color: #000000;
            text-align: center;
            max-width: 800px;
            white-space: pre-line;
            animation: fadeIn 1s ease-out;
        }

        .emoji {
            font-size: 48px;
            line-height: 1;
            text-align: center;
            margin-bottom: 12px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .quote {
                font-size: 24px;
                line-height: 1.6;
            }
            .emoji {
                font-size: 36px;
                margin-bottom: 10px;
            }
        }

        .signature {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 16px;
            color: #666666;
            animation: fadeIn 1s ease-out;
        }
    </style>
</head>
<body>
    <div class="emoji" aria-hidden="true">🌹</div>
    <div class="quote">
        你未看此花时，
        此花与汝心同归于寂；
        你来看此花时，
        则此花颜色一时明白起来，
        便知此花不在你心外。
    </div>
    <div class="signature">—— 王晓林</div>
</body>
</html>
