<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting</title>
</head>
<body>
    <script>
        const target = new URL('index.html', window.location.href);
        target.hash = 'emoji';
        window.location.replace(target.toString());
    </script>
</body>
</html>
