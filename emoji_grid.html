<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'SimSun', serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .emoji-item {
            font-size: 48px;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, filter 0.3s;
            user-select: none;
        }

        /* 未完成状态:暗淡且不可点击 */
        .emoji-item.incomplete {
            filter: grayscale(100%) opacity(0.3);
            cursor: not-allowed;
            pointer-events: none; /* 确保不可点击 */
        }

        /* 已完成状态:亮起来 */
        .emoji-item.completed {
            filter: none;
            opacity: 1;
        }

        .emoji-item.completed:hover {
            transform: scale(1.1);
            background-color: #f5f5f5;
        }

        .back-link {
            margin-top: 40px;
            text-decoration: none;
            color: #666;
            font-size: 16px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #333;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .music-card {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .modal-overlay.active .music-card {
            transform: scale(1);
        }

        .music-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .music-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .music-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .music-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            line-height: 1;
            padding: 5px;
        }

        .close-btn:hover {
            color: #333;
        }

        /* Image Modal Styles */
        .image-card {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            flex-direction: column;
        }

        .image-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 10px;
            max-width: 100%;
            padding-bottom: 10px; /* 滚动条空间 */
        }

        .image-carousel img {
            scroll-snap-align: center;
            flex: 0 0 auto;
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            object-fit: contain;
            display: block;
        }

        /* 隐藏滚动条但保留功能 */
        .image-carousel::-webkit-scrollbar {
            height: 6px;
        }
        .image-carousel::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
        }
        .image-carousel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.5);
            border-radius: 3px;
        }

        .image-card img:not(.carousel-item) {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            object-fit: contain;
            display: block;
        }

        .image-card .close-btn {
            position: absolute;
            top: -40px;
            right: -10px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 1001;
        }

        .image-card .close-btn:hover {
            background: rgba(0,0,0,0.8);
        }

        @media (min-width: 768px) {
            .image-card .close-btn {
                right: -40px;
                top: -40px;
            }
        }

        .navbar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-back {
            text-decoration: none;
            color: #666;
            font-size: 24px;
            transition: color 0.3s;
            font-weight: normal;
            padding: 5px;
            line-height: 1;
            display: inline-block;
        }

        .nav-back:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="nav-back" title="返回">←</a>
    </div>
    <div class="grid-container" id="emojiGrid">
        <!-- Emoji 将通过 JS 插入这里 -->
    </div>

    <!-- Movie Modal -->
    <div class="modal-overlay" id="movieModal">
        <div class="music-card" onclick="window.location.href='https://www.douban.com/people/259913725/subject_doulists/movie'">
            <div class="close-btn" onclick="event.stopPropagation(); closeMovieModal()">×</div>
            <div class="music-logo">
                <img src="photos/豆瓣.png" alt="豆瓣">
            </div>
            <div class="music-title">豆瓣</div>
            <div class="music-desc">点击跳转至观影列表</div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal-overlay" id="imageModal">
        <div class="image-card" onclick="event.stopPropagation();">
            <div class="close-btn" onclick="closeImageModal()">×</div>
            <div id="imageContainer" style="width: 100%; display: flex; justify-content: center;">
                <img id="modalImage" src="" alt="Photo">
            </div>
        </div>
    </div>

    <!-- Text Modal -->
    <div class="modal-overlay" id="textModal">
        <div class="music-card" id="textModalCard" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeTextModal()">×</div>
            <div class="music-title" id="textModalTitle"></div>
            <div class="music-desc" id="textModalContent" style="white-space: pre-wrap; margin-top: 15px; font-size: 16px; line-height: 1.6;"></div>
            <div id="textModalImages" style="margin-top: 15px; width: 100%; display: none;"></div>
        </div>
    </div>

    <script>
        // Modal logic
        const movieModal = document.getElementById('movieModal');
        const imageModal = document.getElementById('imageModal');
        const textModal = document.getElementById('textModal');
        const textModalCard = document.getElementById('textModalCard');
        const modalImage = document.getElementById('modalImage');
        const textModalTitle = document.getElementById('textModalTitle');
        const textModalContent = document.getElementById('textModalContent');
        const textModalImages = document.getElementById('textModalImages');


        function showMovieModal() {
            movieModal.style.display = 'flex';
            // Force reflow
            movieModal.offsetHeight;
            movieModal.classList.add('active');
        }

        function closeMovieModal() {
            movieModal.classList.remove('active');
            setTimeout(() => {
                movieModal.style.display = 'none';
            }, 300);
        }

        const imageContainer = document.getElementById('imageContainer');

        function showImageModal(srcOrArray) {
            imageContainer.innerHTML = ''; // 清空内容

            if (Array.isArray(srcOrArray)) {
                // 如果是图片数组,创建轮播
                const carousel = document.createElement('div');
                carousel.className = 'image-carousel';

                srcOrArray.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = 'Photo';
                    img.className = 'carousel-item';
                    carousel.appendChild(img);
                });
                imageContainer.appendChild(carousel);
            } else {
                // 如果是单张图片
                const img = document.createElement('img');
                img.src = srcOrArray;
                img.alt = 'Photo';
                img.id = 'modalImage';
                imageContainer.appendChild(img);
            }

            imageModal.style.display = 'flex';
            imageModal.offsetHeight;
            imageModal.classList.add('active');
        }

        function closeImageModal() {
            imageModal.classList.remove('active');
            setTimeout(() => {
                imageModal.style.display = 'none';
                imageContainer.innerHTML = ''; // 清理内容
            }, 300);
        }

        function showTextModal(title, text, images, videos) {
            textModalTitle.textContent = title;
            textModalContent.textContent = text;
            textModalImages.innerHTML = ''; // 清空旧内容

            const hasImages = images && images.length > 0;
            const hasVideos = videos && videos.length > 0;

            if (hasImages || hasVideos) {
                // 调整模态框宽度以适应内容
                textModalCard.style.maxWidth = '500px';

                const carousel = document.createElement('div');
                carousel.className = 'image-carousel';
                carousel.style.paddingBottom = '5px';

                // 处理视频
                if (hasVideos) {
                    const videoArray = Array.isArray(videos) ? videos : [videos];
                    videoArray.forEach(src => {
                        const video = document.createElement('video');
                        video.src = src;
                        video.controls = true; // 显示控制条
                        video.className = 'carousel-item';
                        video.style.maxHeight = '300px';
                        video.style.maxWidth = '100%'; // 确保视频不超过容器宽度
                        carousel.appendChild(video);
                    });
                }

                // 处理图片
                if (hasImages) {
                    const imgArray = Array.isArray(images) ? images : [images];

                    imgArray.forEach(src => {
                        const img = document.createElement('img');
                        img.src = src;
                        img.alt = 'Photo';
                        img.className = 'carousel-item';
                        img.style.maxHeight = '300px'; // 限制高度
                        img.onclick = (e) => {
                            e.stopPropagation();
                            showImageModal(src);
                            // 确保图片模态框在文字模态框之上
                            imageModal.style.zIndex = '1002';
                        };
                        carousel.appendChild(img);
                    });
                }

                textModalImages.appendChild(carousel);
                textModalImages.style.display = 'block';
            } else {
                textModalCard.style.maxWidth = '320px'; // 恢复默认宽度
                textModalImages.style.display = 'none';
            }

            textModal.style.display = 'flex';
            textModal.offsetHeight;
            textModal.classList.add('active');
            // 确保文字模态框层级
            textModal.style.zIndex = '1001';
        }

        function closeTextModal() {
            textModal.classList.remove('active');
            setTimeout(() => {
                textModal.style.display = 'none';
                textModal.style.zIndex = ''; // 重置层级
            }, 300);
        }

        // Close modal when clicking outside
        movieModal.onclick = function(event) {
            if (event.target === movieModal) {
                closeMovieModal();
            }
        }

        imageModal.onclick = function(event) {
            if (event.target === imageModal) {
                closeImageModal();
            }
        }

        textModal.onclick = function(event) {
            if (event.target === textModal) {
                closeTextModal();
            }
        }

        const gridContainer = document.getElementById('emojiGrid');
        let allEmojisData = [];

        function sortEmojis(emojis) {
            return [...emojis].sort((a, b) => {
                if (a.completed === b.completed) return 0;
                return a.completed ? -1 : 1;
            });
        }

        // 从 JSON 文件加载 Emoji 数据
        fetch('emojis.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(emojis => {
                allEmojisData = sortEmojis(emojis);
                renderEmojis(allEmojisData);
            })
            .catch(error => {
                console.error('Error loading emojis:', error);
                gridContainer.innerHTML = '<p style="text-align:center; width:100%;">加载数据失败,请确保使用本地服务器运行 (Live Server) 或检查 emojis.json 是否存在。</p>';
            });

        function renderEmojis(emojis) {
            // 清空当前内容
            gridContainer.innerHTML = '';

            if (emojis.length === 0) {
                gridContainer.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; padding: 20px;">没有找到相关 Emoji</p>';
                return;
            }

            // 渲染 Emoji 网格
            emojis.forEach(item => {
                const div = document.createElement('div');
                div.className = `emoji-item ${item.completed ? 'completed' : 'incomplete'}`;
                div.textContent = item.char;
                div.title = item.name + (item.completed ? ' (已完成)' : ' (未完成)');

                if (item.completed) {
                    div.onclick = () => {
                        if (item.text) {
                            showTextModal(item.char + ' ' + item.name, item.text, item.images, item.videos);
                        } else if (item.char === '🎬' || item.char === '\uD83C\uDFAC') {
                            showMovieModal();
                        } else if (item.images && item.images.length > 0) {
                            showImageModal(item.images);
                        }
                    };
                }

                gridContainer.appendChild(div);
            });
        }
    </script>
</body>
</html>
